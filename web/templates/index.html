<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WELFake · Fake-News Detector</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: "class", theme: { extend: { fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui"] } } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background: radial-gradient(1200px 600px at 80% -10%, #1e293b 0%, #0b1120 45%, #060911 100%); }
    .fade-in { animation: fade .35s ease both; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .bar { transition: width .6s cubic-bezier(.22,.61,.36,1); }
  </style>
</head>
<body class="min-h-screen text-slate-200 font-sans">
  <div class="max-w-3xl mx-auto px-4 py-10">

    <!-- Header -->
    <header class="mb-8">
      <div class="flex items-center gap-3">
        <div class="h-11 w-11 rounded-xl bg-gradient-to-br from-indigo-500 to-cyan-400 grid place-items-center text-xl shadow-lg shadow-indigo-500/20">🕵️</div>
        <div>
          <h1 class="text-2xl font-extrabold tracking-tight text-white">WELFake Detector</h1>
          <p class="text-sm text-slate-400">LSTM fake-news classifier · multilingual · source verification</p>
        </div>
        <a href="/docs" target="_blank" class="ml-auto text-xs font-medium text-cyan-300 hover:text-cyan-200 border border-cyan-400/30 rounded-lg px-3 py-1.5">API ↗</a>
      </div>
      <div id="health" class="mt-3 text-xs text-slate-500"></div>
    </header>

    <!-- Tabs -->
    <div class="flex gap-1 p-1 mb-5 bg-slate-800/40 rounded-xl w-fit text-sm">
      <button data-tab="single" class="tab px-4 py-1.5 rounded-lg font-medium bg-slate-700 text-white">Single</button>
      <button data-tab="batch" class="tab px-4 py-1.5 rounded-lg font-medium text-slate-400 hover:text-slate-200">Batch (JSON)</button>
    </div>

    <!-- SINGLE -->
    <section id="panel-single" class="space-y-4">
      <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-5 shadow-xl">
        <label class="block text-xs font-semibold text-slate-400 mb-1">TITLE</label>
        <input id="title" type="text" placeholder="News headline…"
               class="w-full bg-slate-950/60 border border-slate-700 rounded-lg px-3 py-2 mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/60" />

        <label class="block text-xs font-semibold text-slate-400 mb-1">ARTICLE TEXT</label>
        <textarea id="text" rows="7" placeholder="Paste the news content (any language)…"
                  class="w-full bg-slate-950/60 border border-slate-700 rounded-lg px-3 py-2 text-sm leading-relaxed focus:outline-none focus:ring-2 focus:ring-indigo-500/60"></textarea>

        <div class="flex flex-wrap items-center gap-5 mt-4">
          <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
            <input id="translate" type="checkbox" checked class="accent-indigo-500 h-4 w-4" /> Auto-translate
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
            <input id="verify" type="checkbox" checked class="accent-indigo-500 h-4 w-4" /> Verify if flagged fake
          </label>
          <button id="analyze" class="ml-auto bg-gradient-to-r from-indigo-500 to-cyan-500 hover:opacity-90 text-white font-semibold text-sm rounded-lg px-6 py-2.5 shadow-lg shadow-indigo-500/20 disabled:opacity-50">
            Analyze
          </button>
        </div>
      </div>

      <div id="result" class="hidden"></div>
    </section>

    <!-- BATCH -->
    <section id="panel-batch" class="hidden space-y-4">
      <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-5 shadow-xl">
        <label class="block text-xs font-semibold text-slate-400 mb-1">JSON ARRAY OF {title, text}</label>
        <textarea id="batch-json" rows="10"
                  class="w-full bg-slate-950/60 border border-slate-700 rounded-lg px-3 py-2 text-xs font-mono leading-relaxed focus:outline-none focus:ring-2 focus:ring-indigo-500/60"></textarea>
        <div class="flex items-center gap-4 mt-4">
          <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
            <input id="batch-translate" type="checkbox" checked class="accent-indigo-500 h-4 w-4" /> Auto-translate
          </label>
          <button id="run-batch" class="ml-auto bg-gradient-to-r from-indigo-500 to-cyan-500 hover:opacity-90 text-white font-semibold text-sm rounded-lg px-6 py-2.5 shadow-lg shadow-indigo-500/20 disabled:opacity-50">
            Run batch
          </button>
        </div>
      </div>
      <div id="batch-result"></div>
    </section>

    <footer class="mt-10 text-center text-xs text-slate-600">
      WELFake dataset · 72k articles · TB Kecerdasan Mesin
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
